name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint || echo "Backend linting not strictly enforced yet"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint || echo "Frontend linting not strictly enforced yet"

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t sales-insight-automator-backend ./backend

