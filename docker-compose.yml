version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: sia-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: sia-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/sales_insight_automator
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_SENDER=${EMAIL_SENDER}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: sia-frontend
    restart: unless-stopped
    environment:
      - VITE_BACKEND_URL=${BACKEND_URL}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data:

